{% set python_min = "3.10" %}
{% set name = "easygems" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/easygems-{{ version }}.tar.gz
  sha256: 9170ce0a2f9dc134f8c3db9aea24d86ae650f47252bdd1c67575e5eedfab858b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.0.0
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
    - pip
  run:
    - healpix
    - python >={{ python_min }}
    - numpy
    - scipy
    - xarray
    - cf_xarray
    - matplotlib-base
    - healpy
    - cartopy
    - pyproj
    - regionmask >=0.13.0

test:
  imports:
    - easygems
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mpimet/easygems
  summary: Processing tools around km-scale earth system modeling
  license: 'MIT'
  license_file: LICENSE

extra:
  recipe-maintainers:
    - lkluft
    - mahf708
